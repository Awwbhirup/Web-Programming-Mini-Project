<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration | Traffic Rules Academy</title>
    <link rel="stylesheet" href="../CSS FILES/global.css">
    <link rel="stylesheet" href="../CSS FILES/page2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <link rel="icon" href="../MEDIA/video-thumb.png" type="image/png">
</head>
<body>
    <audio id="bg-music" autoplay loop style="display:none"><source src="../MEDIA/BACKGROUND.mp3" type="audio/mp3"></audio>

    
    <header class="glass-header fade-in-down">
        <div class="header-content">
            <a href="page1.html" class="logo-area">
                <div class="logo-icon">
                    <i class="fas fa-traffic-light"></i>
                </div>
                <div class="logo-text">
                    TRAFFIC<span>ACADEMY</span>
                </div>
            </a>
            <nav class="nav-links">
                <a href="page1.html">Home</a>
                <a href="page6.html">Signs</a>
                <a href="page3.html">Courses</a>
                <a href="page4.html">Quiz</a>
                <a href="page8.html">News</a>
                <a href="page2.html" class="btn-register">Register</a>
            </nav>
        </div>
    </header>

    
    <div class="reg-container">
        <div class="reg-card">
            <div class="reg-header">
                <h2>Create Student Account</h2>
                <p>Start your journey to becoming a pro driver.</p>
            </div>
            
            <form action="#" onsubmit="event.preventDefault(); alert('Registration Successful (Simulation)!'); window.location.href='page3.html';">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" class="form-control" placeholder="John Doe" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" class="form-control" min="16" max="99" placeholder="18" required>
                    </div>
                    <div class="form-group">
                        <label>State</label>
                        <select class="form-control">
                            <option>Maharashtra</option>
                            <option>Delhi</option>
                            <option>Karnataka</option>
                            <option>Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" placeholder="john@example.com" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label>License Type Goal</label>
                    <div style="display: flex; gap: 15px; margin-top: 5px;">
                        <label style="font-weight: normal; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                            <input type="radio" name="license" checked> 2-Wheeler
                        </label>
                        <label style="font-weight: normal; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                            <input type="radio" name="license"> 4-Wheeler
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn submit-btn">Start Learning</button>
            </form>

            <div class="form-footer">
                Already have an account? <a href="#">Login here</a>
            </div>
        </div>
    </div>

</body>
</html>
