<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Traffic Rules Academy</title>
    <link rel="stylesheet" href="../CSS FILES/global.css">
    <link rel="stylesheet" href="../CSS FILES/page5.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <link rel="icon" href="../MEDIA/video-thumb.png" type="image/png">
</head>
<body>
    <audio id="bg-music" autoplay loop style="display:none"><source src="../MEDIA/BACKGROUND.mp3" type="audio/mp3"></audio>

    
    <header class="glass-header fade-in-down">
        <div class="header-content">
            <a href="page1.html" class="logo-area">
                <div class="logo-icon">
                    <i class="fas fa-traffic-light"></i>
                </div>
                <div class="logo-text">
                    TRAFFIC<span>ACADEMY</span>
                </div>
            </a>
            <nav class="nav-links">
                <a href="page1.html">Home</a>
                <a href="page6.html">Signs</a>
                <a href="page3.html">Courses</a>
                <a href="page4.html">Quiz</a>
                <a href="page8.html">News</a>
                <a href="page2.html" class="btn-register">Register</a>
            </nav>
        </div>
    </header>

    <div class="contact-container">
        
        
        <div class="contact-info">
            <h2 style="margin-bottom: 30px;">Get in Touch</h2>
            
            <div class="info-item">
                <div class="info-icon"><i class="fas fa-map-marker-alt"></i></div>
                <div class="info-text">
                    <h4>Visit Us</h4>
                    <p>123 Safety Lane, Knowledge City,<br>Road Safety District, 400001</p>
                </div>
            </div>

            <div class="info-item">
                <div class="info-icon"><i class="fas fa-envelope"></i></div>
                <div class="info-text">
                    <h4>Email Support</h4>
                    <p>help@trafficacademy.com<br>support@trafficacademy.com</p>
                </div>
            </div>

            <div class="info-item">
                <div class="info-icon"><i class="fas fa-phone-alt"></i></div>
                <div class="info-text">
                    <h4>Call Us</h4>
                    <p>+91 98765 43210<br>(Mon-Fri, 9am - 6pm)</p>
                </div>
            </div>

            <div class="map-embed">
                <i class="fas fa-map" style="margin-right: 10px;"></i> Interactive Map Placeholder
            </div>
        </div>

        
        <div class="contact-form-section">
            <h3 style="margin-bottom: 20px; color: var(--dark-bg);">Send Feedback</h3>
            
            <form action="#" onsubmit="event.preventDefault(); alert('Thank you for your feedback!');">
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px;">Rate your experience</label>
                    <div class="rating-group">
                        <input type="radio" name="rating" id="star5"><label for="star5" class="rating-star">★</label>
                        <input type="radio" name="rating" id="star4"><label for="star4" class="rating-star">★</label>
                        <input type="radio" name="rating" id="star3"><label for="star3" class="rating-star">★</label>
                        <input type="radio" name="rating" id="star2"><label for="star2" class="rating-star">★</label>
                        <input type="radio" name="rating" id="star1"><label for="star1" class="rating-star">★</label>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px;">Your Message</label>
                    <textarea class="form-control" style="width: 100%; padding: 10px; border: 2px solid #e2e8f0; border-radius: 8px; min-height: 120px;" placeholder="How can we help you?"></textarea>
                </div>

                <button type="submit" class="btn" style="width: 100%;">Submit Feedback</button>
            </form>
        </div>

    </div>

</body>
</html>
