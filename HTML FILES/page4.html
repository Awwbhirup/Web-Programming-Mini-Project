<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment | Traffic Rules Academy</title>
    <link rel="stylesheet" href="../CSS FILES/global.css">
    <link rel="stylesheet" href="../CSS FILES/page4.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <link rel="icon" href="../MEDIA/video-thumb.png" type="image/png">
</head>
<body>
    <audio id="bg-music" autoplay loop style="display:none"><source src="../MEDIA/BACKGROUND.mp3" type="audio/mp3"></audio>

    
    <header class="glass-header fade-in-down">
        <div class="header-content">
            <a href="page1.html" class="logo-area">
                <div class="logo-icon">
                    <i class="fas fa-traffic-light"></i>
                </div>
                <div class="logo-text">
                    TRAFFIC<span>ACADEMY</span>
                </div>
            </a>
            <nav class="nav-links">
                <a href="page1.html">Home</a>
                <a href="page6.html">Signs</a>
                <a href="page3.html">Courses</a>
                <a href="page4.html" class="active">Quiz</a>
                <a href="page8.html">News</a>
                <a href="page2.html" class="btn-register">Register</a>
            </nav>
        </div>
    </header>

    <div class="quiz-container fade-in">
        <div class="quiz-header">
            <h2 id="qTitle">Module 1 Assessment</h2>
            <div class="progress-track">
                <div class="progress-fill" id="progressBar" style="width: 100%"></div>
            </div>
            <p style="color: var(--text-muted); font-size: 0.9rem;" id="qCounter">Full Assessment</p>
        </div>

        
        <div id="questionContainer">
             <div class="question-card">
                <p class="question-text">1. What does a red octagonal sign indicate?</p>
                <div class="options-list">
                    <div class="option-item">
                        <input type="radio" name="q1" id="q1a">
                        <label for="q1a">Yield</label>
                    </div>
                    <div class="option-item">
                        <input type="radio" name="q1" id="q1b">
                        <label for="q1b">Stop</label>
                    </div>
                    <div class="option-item">
                        <input type="radio" name="q1" id="q1c">
                        <label for="q1c">No Parking</label>
                    </div>
                     <div class="option-item">
                        <input type="radio" name="q1" id="q1d">
                        <label for="q1d">School Zone</label>
                    </div>
                </div>
            </div>

            <div class="question-card">
                <p class="question-text">2. When can you turn left on a red light?</p>
                <div class="options-list">
                    <div class="option-item">
                        <input type="radio" name="q2" id="q2a">
                        <label for="q2a">Never</label>
                    </div>
                    <div class="option-item">
                        <input type="radio" name="q2" id="q2b">
                        <label for="q2b">Always</label>
                    </div>
                    <div class="option-item">
                        <input type="radio" name="q2" id="q2c">
                        <label for="q2c">Where signage permits</label>
                    </div>
                    <div class="option-item">
                        <input type="radio" name="q2" id="q2d">
                        <label for="q2d">If no cars are coming</label>
                    </div>
                </div>
            </div>

            <div class="question-card">
                <p class="question-text">3. What is the standard speed limit in a residential area?</p>
                <div class="options-list">
                    <div class="option-item">
                        <input type="radio" name="q3" id="q3a">
                        <label for="q3a">30 km/h</label>
                    </div>
                    <div class="option-item">
                        <input type="radio" name="q3" id="q3b">
                        <label for="q3b">50 km/h</label>
                    </div>
                    <div class="option-item">
                        <input type="radio" name="q3" id="q3c">
                        <label for="q3c">60 km/h</label>
                    </div>
                    <div class="option-item">
                        <input type="radio" name="q3" id="q3d">
                        <label for="q3d">80 km/h</label>
                    </div>
                </div>
            </div>
            
            <div class="question-card">
                <p class="question-text">4. A solid white line on the road means:</p>
                <div class="options-list">
                    <div class="option-item">
                        <input type="radio" name="q4" id="q4a">
                        <label for="q4a">Overtaking allowed</label>
                    </div>
                    <div class="option-item">
                        <input type="radio" name="q4" id="q4b">
                        <label for="q4b">Overtaking prohibited</label>
                    </div>
                    <div class="option-item">
                        <input type="radio" name="q4" id="q4c">
                        <label for="q4c">Parking allowed</label>
                    </div>
                    <div class="option-item">
                        <input type="radio" name="q4" id="q4d">
                        <label for="q4d">Bus lane</label>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
